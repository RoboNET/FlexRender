<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexRender Playground</title>
    <link rel="preload" id="webassembly" />
    <script type="importmap"></script>
    <script type="module" src="main#[.{fingerprint}].js"></script>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 1.2em;
            flex-direction: column;
            gap: 12px;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #333;
            border-top-color: #007acc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #app { display: none; }
        #preview-img {
            max-width: 100%;
            max-height: 80vh;
            image-rendering: auto;
        }
        #status { padding: 4px 12px; font-size: 12px; background: #007acc; color: #fff; }
        #error { color: #f48771; padding: 12px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading FlexRender WASM runtime...</div>
    </div>
    <div id="app">
        <div style="padding: 12px;">
            <h2 style="margin:0 0 12px 0">FlexRender Playground — WASM Test</h2>
            <img id="preview-img" />
            <pre id="error"></pre>
        </div>
        <div id="status">Ready</div>
    </div>
</body>
</html>
