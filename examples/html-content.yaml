template:
  name: "html-content-demo"
  version: 1

canvas:
  fixed: width
  width: 400
  background: "#ffffff"

layout:
  # Static header
  - type: text
    content: "HTML Content Demo"
    size: "1.5em"
    fontWeight: bold
    color: "#333333"
    padding: "16 16 8 16"

  - type: separator
    color: "#e0e0e0"
    thickness: 1

  # Dynamic HTML content from data
  - type: content
    source: "{{body}}"
    format: html
    padding: "12 16"

  - type: separator
    color: "#e0e0e0"
    thickness: 1

  # Static footer
  - type: text
    content: "Generated by FlexRender"
    size: "0.8em"
    color: "#999999"
    align: center
    padding: "8 16 16 16"
